# DB BOX — MariaDB only. Runs on the dedicated database VM.
#   docker compose -p crmdb -f compose.db.yml --env-file .env up -d
# Firewall 3306 to the APP VM only. db-init grants root from APP_HOST (the app VM IP).
name: crmdb

services:
  db:
    image: mariadb:11.8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-22G}
      - --innodb-file-per-table=1
      - --max-connections=${DB_MAX_CONNECTIONS:-200}
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: 1
      APP_HOST: ${APP_HOST:-%}                 # consumed by db-init/remote-root.sh
    volumes:
      - db-data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "3306:3306"          # bind to the private VNet interface; NSG-restrict to the APP VM IP

volumes:
  db-data:
